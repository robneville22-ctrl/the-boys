    // ============================================================
    // FOOTBALL — Run the ball!
    // ============================================================
    let fr = {};
    function initFootballRun() {
      document.getElementById('instructions').textContent = 'Arrow keys to run! Dodge defenders and reach the end zone!';
      timeLeft = 30;
      fr = {
        player: { x: 80, y: 250, speed: 4.5 },
        defenders: [],
        touchdowns: 0, tackles: 0, yardsGained: 0,
        message: '', messageTimer: 0, messageColor: '#66bb6a',
        spawnTimer: 0,
      };
      spawnRunDefenders();
    }

    function spawnRunDefenders() {
      fr.defenders = [];
      const count = 4 + Math.min(fr.touchdowns, 4);
      for (let i = 0; i < count; i++) {
        fr.defenders.push({
          x: 200 + i * 120 + Math.random() * 60,
          y: 80 + Math.random() * 340,
          vy: (Math.random() > 0.5 ? 1 : -1) * (1.5 + Math.random() * 2),
          speed: 0.8 + Math.random() * 0.8 + fr.touchdowns * 0.15,
        });
      }
    }

    function updateFootballRun() {
      const p = fr.player;
      if (keys['ArrowUp'] || keys['w']) p.y -= p.speed;
      if (keys['ArrowDown'] || keys['s']) p.y += p.speed;
      if (keys['ArrowLeft'] || keys['a']) p.x -= p.speed;
      if (keys['ArrowRight'] || keys['d']) p.x += p.speed;
      p.x = Math.max(10, Math.min(790, p.x));
      p.y = Math.max(60, Math.min(440, p.y));

      drawFootballField();

      // Defenders chase player
      fr.defenders.forEach(d => {
        d.y += d.vy;
        if (d.y < 60 || d.y > 440) d.vy *= -1;
        // Chase horizontally
        const dx = p.x - d.x;
        const dy = p.y - d.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 250) {
          d.x += (dx / dist) * d.speed;
          d.y += (dy / dist) * d.speed * 0.5;
        }

        drawDefender(d.x, d.y, '#2255aa');
        drawHelmet(d.x, d.y, '#2255aa');

        // Tackle check
        if (Math.abs(p.x - d.x) < 20 && Math.abs(p.y - d.y) < 25) {
          fr.tackles++;
          fr.message = 'TACKLED!';
          fr.messageColor = '#e53935';
          fr.messageTimer = 40;
          fr.yardsGained += Math.max(0, Math.floor((p.x - 80) / 7));
          p.x = 80;
          p.y = 250;
          spawnRunDefenders();
        }
      });

      // Draw player (runner)
      drawPlayer(p.x, p.y, '#e53935');
      drawHelmet(p.x, p.y, '#e53935');
      drawFootballInHand(p.x, p.y);

      // Touchdown check
      if (p.x > 770) {
        score += 7;
        fr.touchdowns++;
        fr.message = 'TOUCHDOWN!';
        fr.messageColor = '#ffd54f';
        fr.messageTimer = 50;
        updateHUD();
        p.x = 80;
        p.y = 250;
        spawnRunDefenders();
      }

      if (fr.messageTimer > 0) {
        fr.messageTimer--;
        drawMessage(fr.message, fr.messageColor, 100);
      }

      updateScoreboard(`
        <div class="sb-row"><span class="sb-label">Touchdowns</span><span class="sb-val accent">${fr.touchdowns}</span></div>
        <div class="sb-row"><span class="sb-label">Tackles</span><span class="sb-val">${fr.tackles}</span></div>
        <div class="sb-row"><span class="sb-label">Yards</span><span class="sb-val">${fr.yardsGained}</span></div>
      `);
    }

    // ============================================================
    // FOOTBALL — Defense! Tackle the runner!
    // ============================================================
    let fd = {};
    function initFootballDefense() {
      document.getElementById('instructions').textContent = 'Arrow keys to move. Click near the runner to tackle them!';
      timeLeft = 30;
      fd = {
        player: { x: 500, y: 250, speed: 4 },
        runner: { x: 80, y: 250, targetY: 250, speed: 3.5 },
        tackles: 0, touchdownsAllowed: 0, attempts: 0,
        message: '', messageTimer: 0, messageColor: '#66bb6a',
        resetTimer: 0,
      };
      resetRunner();
    }

    function resetRunner() {
      fd.attempts++;
      fd.runner.x = 80;
      fd.runner.y = 100 + Math.random() * 300;
      fd.runner.targetY = fd.runner.y;
      fd.runner.speed = 3 + Math.min(fd.tackles, 5) * 0.3;
      fd.player.x = 500;
      fd.resetTimer = 0;
    }

    function clickFootballDefense(mx, my) {
      // Dive tackle — lunge toward click position
      const p = fd.player;
      const r = fd.runner;
      const dist = Math.sqrt((p.x - r.x) ** 2 + (p.y - r.y) ** 2);
      if (dist < 50) {
        fd.tackles++;
        score += 3;
        fd.message = 'TACKLE!';
        fd.messageColor = '#66bb6a';
        fd.messageTimer = 40;
        updateHUD();
        fd.resetTimer = 50;
      } else if (dist < 100) {
        // Dive attempt — lunge player toward runner
        const dx = r.x - p.x;
        const dy = r.y - p.y;
        p.x += dx * 0.5;
        p.y += dy * 0.5;
      }
    }

    function updateFootballDefense() {
      const p = fd.player;
      const r = fd.runner;

      if (fd.resetTimer > 0) {
        fd.resetTimer--;
        if (fd.resetTimer === 0) resetRunner();
      }

      // Player movement
      if (keys['ArrowUp'] || keys['w']) p.y -= p.speed;
      if (keys['ArrowDown'] || keys['s']) p.y += p.speed;
      if (keys['ArrowLeft'] || keys['a']) p.x -= p.speed;
      if (keys['ArrowRight'] || keys['d']) p.x += p.speed;
      p.x = Math.max(10, Math.min(790, p.x));
      p.y = Math.max(60, Math.min(440, p.y));

      drawFootballField();

      // Runner AI — runs toward end zone, jukes around player
      if (fd.resetTimer === 0) {
        r.x += r.speed;
        // Juke: change targetY periodically or when near defender
        const distToPlayer = Math.sqrt((p.x - r.x) ** 2 + (p.y - r.y) ** 2);
        if (distToPlayer < 120) {
          // Juke away from player
          const awayY = r.y + (r.y > p.y ? 40 : -40);
          r.targetY = Math.max(80, Math.min(420, awayY));
        }
        if (Math.random() < 0.02) r.targetY = 100 + Math.random() * 300;
        r.y += (r.targetY - r.y) * 0.06;

        // Auto tackle if very close
        if (distToPlayer < 25) {
          fd.tackles++;
          score += 3;
          fd.message = 'TACKLE!';
          fd.messageColor = '#66bb6a';
          fd.messageTimer = 40;
          updateHUD();
          fd.resetTimer = 50;
        }
      }

      // Draw runner (red — opponent has the ball)
      drawPlayer(r.x, r.y, '#e53935');
      drawHelmet(r.x, r.y, '#e53935');
      drawFootballInHand(r.x, r.y);

      // Draw defender (you — blue)
      drawDefender(p.x, p.y, '#2255aa');
      drawHelmet(p.x, p.y, '#2255aa');

      // "Tackle range" indicator
      const distToRunner = Math.sqrt((p.x - r.x) ** 2 + (p.y - r.y) ** 2);
      if (distToRunner < 80 && fd.resetTimer === 0) {
        ctx.strokeStyle = `rgba(255, 255, 100, ${0.3 + Math.sin(Date.now() / 150) * 0.15})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(r.x, r.y, 30, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Touchdown (runner reaches end zone)
      if (r.x > 770 && fd.resetTimer === 0) {
        fd.touchdownsAllowed++;
        fd.message = 'TOUCHDOWN ALLOWED!';
        fd.messageColor = '#e53935';
        fd.messageTimer = 45;
        fd.resetTimer = 50;
      }

      if (fd.messageTimer > 0) {
        fd.messageTimer--;
        drawMessage(fd.message, fd.messageColor, 100);
      }

      const tackleRate = fd.attempts > 0 ? Math.round((fd.tackles / fd.attempts) * 100) : 0;
      updateScoreboard(`
        <div class="sb-row"><span class="sb-label">Tackles</span><span class="sb-val accent">${fd.tackles}</span></div>
        <div class="sb-row"><span class="sb-label">TDs Allowed</span><span class="sb-val">${fd.touchdownsAllowed}</span></div>
        <div class="sb-row"><span class="sb-label">Attempts</span><span class="sb-val">${fd.attempts}</span></div>
        <div class="sb-row"><span class="sb-label">Tackle %</span><span class="sb-val">${tackleRate}%</span></div>
      `);
    }

    // ============================================================
    // FOOTBALL — 1-on-1 Coverage! Play CB vs WR!
    // ============================================================
    let cv = {};
    function initFootballCoverage() {
      document.getElementById('instructions').textContent = 'Arrow keys to move with the WR. Click to swat when the ball comes!';
      timeLeft = 45;
      cv = {
        player: { x: 600, y: 250, speed: 4.2 }, // CB (you)
        wr: { x: 620, y: 250, speed: 4.5 },     // WR (AI)
        ball: null,       // { x, y, targetX, targetY, speed } when thrown
        phase: 'route',   // 'route' | 'thrown' | 'reset'
        routeTimer: 0,
        routePoints: [],  // WR runs a route
        routeIdx: 0,
        resetTimer: 0,
        breakups: 0,
        catches: 0,
        attempts: 0,
        message: '', messageTimer: 0, messageColor: '#66bb6a',
      };
      setupRoute();
    }

    function setupRoute() {
      cv.attempts++;
      // WR lines up on right side, runs a route
      const routes = [
        // Go route (straight deep)
        [{x: 600, y: 130}, {x: 580, y: 80}],
        // Slant
        [{x: 580, y: 230}, {x: 400, y: 180}],
        // Out route
        [{x: 580, y: 250}, {x: 580, y: 130}, {x: 700, y: 130}],
        // Curl
        [{x: 560, y: 180}, {x: 560, y: 160}, {x: 580, y: 200}],
        // Post
        [{x: 560, y: 200}, {x: 400, y: 120}],
        // Corner route
        [{x: 560, y: 200}, {x: 680, y: 100}],
        // Dig / In route
        [{x: 560, y: 250}, {x: 560, y: 180}, {x: 380, y: 180}],
        // Comeback
        [{x: 560, y: 150}, {x: 580, y: 200}],
      ];
      const route = routes[Math.floor(Math.random() * routes.length)];
      cv.wr.x = 620; cv.wr.y = 250;
      cv.player.x = 640; cv.player.y = 250;
      cv.routePoints = route;
      cv.routeIdx = 0;
      cv.routeTimer = 60 + Math.floor(Math.random() * 30); // snap delay
      cv.phase = 'route';
      cv.ball = null;
      cv.resetTimer = 0;
    }

    function clickFootballCoverage(mx, my) {
      if (cv.phase === 'thrown' && cv.ball) {
        const p = cv.player;
        const b = cv.ball;
        const dist = Math.sqrt((p.x - b.x) ** 2 + (p.y - b.y) ** 2);
        if (dist < 55) {
          cv.breakups++;
          score += 4;
          cv.message = 'PASS BREAKUP!';
          cv.messageColor = '#66bb6a';
          cv.messageTimer = 50;
          cv.phase = 'reset';
          cv.resetTimer = 60;
          cv.ball = null;
          updateHUD();
        }
      }
    }

    function updateFootballCoverage() {
      const p = cv.player;
      const wr = cv.wr;

      // Player (CB) movement
      if (keys['ArrowUp'] || keys['w']) p.y -= p.speed;
      if (keys['ArrowDown'] || keys['s']) p.y += p.speed;
      if (keys['ArrowLeft'] || keys['a']) p.x -= p.speed;
      if (keys['ArrowRight'] || keys['d']) p.x += p.speed;
      p.x = Math.max(10, Math.min(790, p.x));
      p.y = Math.max(60, Math.min(440, p.y));

      drawFootballField();

      // Draw line of scrimmage
      ctx.strokeStyle = '#42a5f5';
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 6]);
      ctx.beginPath(); ctx.moveTo(0, 265); ctx.lineTo(800, 265); ctx.stroke();
      ctx.setLineDash([]);

      if (cv.phase === 'route') {
        // Pre-snap countdown
        if (cv.routeTimer > 0) {
          cv.routeTimer--;
          // Draw WR and CB at line
          drawPlayer(wr.x, wr.y, '#e53935', -1);
          drawHelmet(wr.x, wr.y, '#e53935');
          drawDefender(p.x, p.y, '#2255aa');
          drawHelmet(p.x, p.y, '#2255aa');
          // "SET" text
          if (cv.routeTimer > 20) {
            ctx.fillStyle = '#ffd54f';
            ctx.font = 'bold 28px Outfit';
            ctx.textAlign = 'center';
            ctx.fillText('SET...', 400, 300);
          } else {
            ctx.fillStyle = '#66bb6a';
            ctx.font = 'bold 32px Outfit';
            ctx.textAlign = 'center';
            ctx.fillText('HIKE!', 400, 300);
          }
          return;
        }

        // WR runs the route
        if (cv.routeIdx < cv.routePoints.length) {
          const target = cv.routePoints[cv.routeIdx];
          const dx = target.x - wr.x;
          const dy = target.y - wr.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 5) {
            cv.routeIdx++;
          } else {
            wr.x += (dx / dist) * wr.speed;
            wr.y += (dy / dist) * wr.speed;
          }
        }

        // Once route is done, QB throws
        if (cv.routeIdx >= cv.routePoints.length) {
          // Throw the ball from QB position
          cv.ball = { x: 200, y: 260, speed: 6 };
          cv.phase = 'thrown';
        }
      }

      if (cv.phase === 'thrown' && cv.ball) {
        const b = cv.ball;
        // Ball flies toward WR's current position
        const dx = wr.x - b.x;
        const dy = wr.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 8) {
          // Ball arrived — did CB break it up?
          const cbDist = Math.sqrt((p.x - wr.x) ** 2 + (p.y - wr.y) ** 2);
          if (cbDist < 40) {
            cv.breakups++;
            score += 4;
            cv.message = 'TIGHT COVERAGE!';
            cv.messageColor = '#66bb6a';
            cv.messageTimer = 50;
            updateHUD();
          } else {
            cv.catches++;
            cv.message = 'CATCH ALLOWED!';
            cv.messageColor = '#e53935';
            cv.messageTimer = 50;
          }
          cv.phase = 'reset';
          cv.resetTimer = 70;
          cv.ball = null;
        } else {
          b.x += (dx / dist) * b.speed;
          b.y += (dy / dist) * b.speed;
        }
      }

      if (cv.phase === 'reset') {
        cv.resetTimer--;
        if (cv.resetTimer <= 0) setupRoute();
      }

      // Draw WR (red)
      drawPlayer(wr.x, wr.y, '#e53935', -1);
      drawHelmet(wr.x, wr.y, '#e53935');

      // Draw CB (you — blue)
      drawDefender(p.x, p.y, '#2255aa');
      drawHelmet(p.x, p.y, '#2255aa');

      // Draw ball if in flight
      if (cv.ball) {
        ctx.fillStyle = '#8B4513';
        ctx.beginPath();
        ctx.ellipse(cv.ball.x, cv.ball.y, 10, 6, 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cv.ball.x - 3, cv.ball.y - 4);
        ctx.lineTo(cv.ball.x + 3, cv.ball.y + 4);
        ctx.stroke();
      }

      // Proximity indicator — glow when close to WR
      const distToWR = Math.sqrt((p.x - wr.x) ** 2 + (p.y - wr.y) ** 2);
      if (distToWR < 60 && cv.phase !== 'reset') {
        ctx.strokeStyle = `rgba(100, 255, 100, ${0.3 + Math.sin(Date.now() / 150) * 0.15})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(wr.x, wr.y, 35, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Draw QB (just a static figure on the left)
      if (cv.phase !== 'reset') {
        drawPlayer(200, 260, '#e53935', 1);
        drawHelmet(200, 260, '#e53935');
      }

      if (cv.messageTimer > 0) {
        cv.messageTimer--;
        drawMessage(cv.message, cv.messageColor, 100);
      }

      const rate = cv.attempts > 0 ? Math.round((cv.breakups / cv.attempts) * 100) : 0;
      updateScoreboard(`
        <div class="sb-row"><span class="sb-label">Breakups</span><span class="sb-val accent">${cv.breakups}</span></div>
        <div class="sb-row"><span class="sb-label">Catches</span><span class="sb-val">${cv.catches}</span></div>
        <div class="sb-row"><span class="sb-label">Plays</span><span class="sb-val">${cv.attempts}</span></div>
        <div class="sb-row"><span class="sb-label">Coverage %</span><span class="sb-val">${rate}%</span></div>
      `);
    }

    // ============================================================
    // MATH — 3rd grade math challenge!
    // ============================================================
    let mt = {};
    function initMath() {
      document.getElementById('instructions').textContent = 'Click the correct answer!';
      timeLeft = mathTimeLimit;
      mt = {
        correct: 0, wrong: 0, streak: 0, bestStreak: 0,
        question: '', answer: 0, choices: [],
        choiceBoxes: [], // { x, y, w, h, val, color }
        message: '', messageTimer: 0, messageColor: '#66bb6a',
        questionTimer: 0,
        particles: [],
      };
      generateQuestion();
    }

    function generateQuestion() {
      // Pick operation based on mathOp setting
      const ops = { add: 0, sub: 1, mul: 2, div: 3 };
      const type = mathOp === 'all' ? Math.floor(Math.random() * 4) : ops[mathOp];
      let a, b, answer, symbol;
      if (type === 0) { // addition
        a = Math.floor(Math.random() * 100) + 10;
        b = Math.floor(Math.random() * 100) + 10;
        answer = a + b;
        symbol = '+';
      } else if (type === 1) { // subtraction
        a = Math.floor(Math.random() * 100) + 20;
        b = Math.floor(Math.random() * Math.min(a, 50)) + 1;
        answer = a - b;
        symbol = '−';
      } else if (type === 2) { // multiplication
        a = Math.floor(Math.random() * 10) + 2;
        b = Math.floor(Math.random() * 10) + 2;
        answer = a * b;
        symbol = '×';
      } else { // division
        b = Math.floor(Math.random() * 9) + 2;
        answer = Math.floor(Math.random() * 10) + 2;
        a = b * answer;
        symbol = '÷';
      }

      mt.numA = a;
      mt.numB = b;
      mt.symbol = symbol;
      mt.question = `${a} ${symbol} ${b} = ?`;
      mt.answer = answer;

      // Generate 4 choices (1 correct + 3 wrong)
      const choices = [answer];
      while (choices.length < 4) {
        let wrong = answer + Math.floor(Math.random() * 20) - 10;
        if (wrong === answer || wrong < 0 || choices.includes(wrong)) continue;
        choices.push(wrong);
      }
      // Shuffle
      for (let i = choices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [choices[i], choices[j]] = [choices[j], choices[i]];
      }
      mt.choices = choices;
      mt.questionTimer = 0;

      // Position choice boxes
      const boxW = 160;
      const boxH = 70;
      const gap = 20;
      const startX = (800 - (boxW * 2 + gap)) / 2;
      const startY = 280;
      mt.choiceBoxes = choices.map((val, i) => ({
        x: startX + (i % 2) * (boxW + gap),
        y: startY + Math.floor(i / 2) * (boxH + gap),
        w: boxW, h: boxH, val,
        color: '#1a1b26', hover: false,
      }));
    }

    function clickMath(mx, my) {
      if (mt.messageTimer > 15) return; // cooldown after answer
      mt.choiceBoxes.forEach(box => {
        if (mx > box.x && mx < box.x + box.w && my > box.y && my < box.y + box.h) {
          if (box.val === mt.answer) {
            mt.correct++;
            mt.streak++;
            if (mt.streak > mt.bestStreak) mt.bestStreak = mt.streak;
            const bonus = mt.streak >= 5 ? 3 : mt.streak >= 3 ? 2 : 1;
            score += bonus;
            mt.message = bonus > 1 ? `CORRECT! ${mt.streak} STREAK! +${bonus}` : 'CORRECT!';
            mt.messageColor = '#66bb6a';
            mt.messageTimer = 25;
            // Celebration particles
            for (let i = 0; i < 12; i++) {
              mt.particles.push({
                x: box.x + box.w / 2, y: box.y + box.h / 2,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10 - 3,
                life: 40,
                color: ['#e53935', '#ffd54f', '#66bb6a', '#42a5f5'][Math.floor(Math.random() * 4)],
              });
            }
            updateHUD();
          } else {
            mt.wrong++;
            mt.streak = 0;
            mt.message = `NOPE! It was ${mt.answer}`;
            mt.messageColor = '#e53935';
            mt.messageTimer = 35;
          }
          setTimeout(generateQuestion, 600);
        }
      });
    }

    function updateMath() {
      // Background
      const bg = ctx.createLinearGradient(0, 0, 0, 500);
      bg.addColorStop(0, '#1a1a2e');
      bg.addColorStop(1, '#16213e');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, 800, 500);

      // Grid pattern
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 20; i++) {
        ctx.beginPath(); ctx.moveTo(i * 40, 0); ctx.lineTo(i * 40, 500); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i * 40); ctx.lineTo(800, i * 40); ctx.stroke();
      }

      // Question — vertical layout (like on paper)
      mt.questionTimer++;
      const scale = Math.min(mt.questionTimer / 8, 1);
      ctx.save();
      ctx.translate(400, 80);
      ctx.scale(scale, scale);
      ctx.font = '900 48px Outfit';
      ctx.textAlign = 'right';
      // Top number
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillText(String(mt.numA), 42, 2);
      ctx.fillStyle = '#f0f0f4';
      ctx.fillText(String(mt.numA), 40, 0);
      // Symbol + bottom number
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillText(String(mt.numB), 42, 57);
      ctx.fillStyle = '#f0f0f4';
      ctx.fillText(String(mt.numB), 40, 55);
      // Operation symbol on the left
      ctx.textAlign = 'left';
      ctx.fillStyle = '#e53935';
      ctx.fillText(mt.symbol, -70, 57);
      // Horizontal line under the problem
      const lineW = 140;
      ctx.strokeStyle = '#f0f0f4';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-70, 72);
      ctx.lineTo(-70 + lineW, 72);
      ctx.stroke();
      // Question mark below the line
      ctx.textAlign = 'center';
      ctx.fillStyle = '#6b6b7b';
      ctx.font = '800 36px Outfit';
      ctx.fillText('?', -2, 112);
      ctx.restore();

      // Streak indicator
      if (mt.streak >= 2) {
        ctx.fillStyle = '#ffd54f';
        ctx.font = '800 18px Outfit';
        ctx.textAlign = 'center';
        ctx.fillText(`🔥 ${mt.streak} in a row!`, 400, 195);
      }

      // Choice boxes
      const mouseX = canvas._mouseX || 0;
      const mouseY = canvas._mouseY || 0;
      mt.choiceBoxes.forEach(box => {
        const hover = mouseX > box.x && mouseX < box.x + box.w && mouseY > box.y && mouseY < box.y + box.h;

        // Box background
        ctx.fillStyle = hover ? '#2a2b3a' : '#1a1b26';
        ctx.beginPath();
        ctx.roundRect(box.x, box.y, box.w, box.h, 14);
        ctx.fill();

        // Border
        ctx.strokeStyle = hover ? '#e53935' : '#2a2b3a';
        ctx.lineWidth = hover ? 2 : 1;
        ctx.stroke();

        // Hover lift shadow
        if (hover) {
          ctx.fillStyle = 'rgba(229, 57, 53, 0.1)';
          ctx.beginPath();
          ctx.roundRect(box.x, box.y + 2, box.w, box.h, 14);
          ctx.fill();
        }

        // Number
        ctx.fillStyle = hover ? '#fff' : '#e8e8ec';
        ctx.font = '800 32px Outfit';
        ctx.textAlign = 'center';
        ctx.fillText(box.val, box.x + box.w / 2, box.y + box.h / 2 + 11);
      });

      // Particles
      mt.particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 40;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      mt.particles = mt.particles.filter(p => p.life > 0);

      // Message
      if (mt.messageTimer > 0) {
        mt.messageTimer--;
        drawMessage(mt.message, mt.messageColor, 240);
      }

      const total = mt.correct + mt.wrong;
      const pct = total > 0 ? Math.round((mt.correct / total) * 100) : 0;
      updateScoreboard(`
        <div class="sb-row"><span class="sb-label">Correct</span><span class="sb-val accent">${mt.correct}</span></div>
        <div class="sb-row"><span class="sb-label">Wrong</span><span class="sb-val">${mt.wrong}</span></div>
        <div class="sb-row"><span class="sb-label">Accuracy</span><span class="sb-val">${pct}%</span></div>
        <div class="sb-row"><span class="sb-label">Best Streak</span><span class="sb-val">${mt.bestStreak}</span></div>
      `);
    }

    // Track mouse position for math hover effects
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      canvas._mouseX = e.clientX - rect.left;
      canvas._mouseY = e.clientY - rect.top;
    });

    let rn = {};
    function initRunning() {
      document.getElementById('instructions').textContent = 'Hold down to run! Release to slow down!';
      // Scale time by distance
      timeLeft = runDistance <= 50 ? 20 : runDistance <= 100 ? 30 : 45;
      // Scale finish line by distance (50m=short, 100m=medium, 150m=long)
      const finishMap = { 50: 520, 100: 720, 150: 720 };
      const scrollMap = { 50: false, 100: false, 150: true };
      rn = {
        player: { x: 80, y: 250, speed: 0 },
        opponents: [
          { x: 80, y: 150, speed: 0, baseSpeed: 4.2, color: '#42a5f5', name: 'Blue' },
          { x: 80, y: 200, speed: 0, baseSpeed: 4.6, color: '#ffd54f', name: 'Gold' },
          { x: 80, y: 300, speed: 0, baseSpeed: 4.9, color: '#ab47bc', name: 'Purple' },
          { x: 80, y: 350, speed: 0, baseSpeed: 4.4, color: '#26a69a', name: 'Teal' },
        ],
        races: 0, wins: 0,
        raceActive: true,
        finishDist: runDistance * 6, // total pixel distance to cover
        scrolling: runDistance >= 150,
        cameraX: 0,
        message: '', messageTimer: 0, messageColor: '#66bb6a',
        momentum: 0,
        maxSpeed: 5.5,
        distance: runDistance,
        laneY: [150, 200, 250, 300, 350],
        countdown: 90, // 1.5 seconds at 60fps
        started: false,
      };
      // Adjust opponent speed by distance
      if (runDistance === 50) {
        rn.opponents.forEach(o => o.baseSpeed *= 1.1);
        rn.maxSpeed = 5;
      } else if (runDistance === 150) {
        rn.opponents.forEach(o => o.baseSpeed *= 0.9);
        rn.maxSpeed = 5;
      }
    }

    function clickRunning(mx, my) {
      // no click action — hold to run
    }

    function updateRunning() {
      const trackLen = rn.finishDist + 150;
      const camX = rn.scrolling ? rn.cameraX : 0;

      // Track background
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(0, 0, 800, 500);

      // Lanes
      rn.laneY.forEach((ly, i) => {
        ctx.fillStyle = i % 2 === 0 ? '#a93226' : '#b03a2e';
        ctx.fillRect(0, ly - 22, 800, 44);
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.setLineDash([10, 10]);
        ctx.beginPath(); ctx.moveTo(0, ly - 22); ctx.lineTo(800, ly - 22); ctx.stroke();
        ctx.setLineDash([]);
      });

      // Start line
      const startLineX = 70 - camX;
      if (startLineX > -10 && startLineX < 810) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(startLineX, 120); ctx.lineTo(startLineX, 380); ctx.stroke();
      }

      // Finish line (checkered)
      const finishScreenX = 70 + rn.finishDist - camX;
      if (finishScreenX > -40 && finishScreenX < 840) {
        for (let row = 0; row < 26; row++) {
          for (let col = 0; col < 3; col++) {
            ctx.fillStyle = (row + col) % 2 === 0 ? '#fff' : '#222';
            ctx.fillRect(finishScreenX + col * 10, 120 + row * 10, 10, 10);
          }
        }
      }

      // Distance markers every ~50m
      for (let m = 50; m <= rn.distance; m += 50) {
        const mx = 70 + (m / rn.distance) * rn.finishDist - camX;
        if (mx > 0 && mx < 800) {
          ctx.fillStyle = 'rgba(255,255,255,0.2)';
          ctx.font = '600 12px Outfit';
          ctx.textAlign = 'center';
          ctx.fillText(`${m}m`, mx, 110);
        }
      }

      // Countdown before race starts
      if (rn.countdown > 0) {
        rn.countdown--;
        const secs = Math.ceil(rn.countdown / 60);
        ctx.fillStyle = '#ffd54f';
        ctx.font = '900 72px Outfit';
        ctx.textAlign = 'center';
        if (secs > 0) {
          ctx.fillText(secs, 400, 80);
        } else {
          ctx.fillStyle = '#66bb6a';
          ctx.fillText('GO!', 400, 80);
        }
        // Draw runners in starting position
        rn.opponents.forEach(opp => {
          drawPlayer(opp.x - camX, opp.y, opp.color, 1);
        });
        drawPlayer(rn.player.x - camX, rn.player.y, '#e53935', 1);
        // Player arrow
        ctx.fillStyle = '#ffd54f';
        ctx.beginPath();
        ctx.moveTo(rn.player.x - camX, rn.player.y - 42);
        ctx.lineTo(rn.player.x - camX - 6, rn.player.y - 50);
        ctx.lineTo(rn.player.x - camX + 6, rn.player.y - 50);
        ctx.fill();
        return;
      }
      rn.started = true;

      // Hold to run — holding builds momentum, releasing lets it decay
      if (holding && rn.raceActive) {
        rn.momentum = Math.min(rn.momentum + 0.12, rn.maxSpeed);
      } else {
        rn.momentum *= 0.97;
        if (rn.momentum < 0.1) rn.momentum = 0;
      }
      rn.player.speed = rn.momentum;

      if (rn.raceActive) {
        rn.player.x += rn.player.speed;

        // Move opponents
        rn.opponents.forEach(opp => {
          opp.speed = opp.baseSpeed + (Math.random() - 0.3) * 0.4;
          opp.x += opp.speed;
        });

        // Scroll camera for 150m
        if (rn.scrolling) {
          rn.cameraX = Math.max(0, rn.player.x - 200);
        }

        // Check finish
        const finishLine = 70 + rn.finishDist;
        if (rn.player.x >= finishLine) {
          rn.raceActive = false;
          rn.races++;
          const behind = rn.opponents.filter(o => o.x < finishLine).length;
          const place = rn.opponents.length - behind + 1;
          if (place === 1) {
            rn.wins++; score += 5;
            rn.message = '🥇 1ST PLACE! +5'; rn.messageColor = '#ffd54f';
          } else if (place === 2) {
            score += 3;
            rn.message = '🥈 2ND PLACE! +3'; rn.messageColor = '#bdbdbd';
          } else if (place === 3) {
            score += 1;
            rn.message = '🥉 3RD PLACE! +1'; rn.messageColor = '#ff8a65';
          } else {
            rn.message = `${place}TH PLACE...`; rn.messageColor = '#e53935';
          }
          rn.messageTimer = 60;
          updateHUD();
          setTimeout(() => {
            rn.player.x = 80; rn.momentum = 0; rn.cameraX = 0;
            rn.opponents.forEach(opp => {
              opp.x = 80;
              opp.baseSpeed += 0.12;
            });
            rn.raceActive = true;
          }, 1500);
        }
      }

      // Draw opponents
      rn.opponents.forEach(opp => {
        const sx = opp.x - camX;
        if (sx > -40 && sx < 840) drawPlayer(sx, opp.y, opp.color, 1);
      });

      // Draw player
      const px = rn.player.x - camX;
      drawPlayer(Math.min(px, 780), rn.player.y, '#e53935', 1);
      // Player arrow
      ctx.fillStyle = '#ffd54f';
      ctx.beginPath();
      ctx.moveTo(Math.min(px, 780), rn.player.y - 42);
      ctx.lineTo(Math.min(px, 780) - 6, rn.player.y - 50);
      ctx.lineTo(Math.min(px, 780) + 6, rn.player.y - 50);
      ctx.fill();

      // Speed meter
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(20, 400, 160, 16);
      const pct = rn.momentum / rn.maxSpeed;
      ctx.fillStyle = pct > 0.7 ? '#ffd54f' : pct > 0.4 ? '#66bb6a' : '#42a5f5';
      ctx.fillRect(20, 400, 160 * pct, 16);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
      ctx.strokeRect(20, 400, 160, 16);
      ctx.fillStyle = '#fff'; ctx.font = '600 11px Outfit'; ctx.textAlign = 'center';
      ctx.fillText('SPEED', 100, 434);

      // Hold indicator
      ctx.fillStyle = holding ? '#66bb6a' : '#6b6b7b';
      ctx.font = '800 20px Outfit'; ctx.textAlign = 'center';
      ctx.fillText(holding ? '🏃 RUNNING!' : 'HOLD TO RUN!', 400, 460);

      // Distance label
      ctx.fillStyle = '#9b9bab'; ctx.font = '600 14px Outfit';
      ctx.fillText(`${rn.distance}m Race`, 400, 480);

      // Message
      if (rn.messageTimer > 0) {
        rn.messageTimer--;
        drawMessage(rn.message, rn.messageColor, 80);
      }

      updateScoreboard(`
        <div class="sb-row"><span class="sb-label">Distance</span><span class="sb-val">${rn.distance}m</span></div>
        <div class="sb-row"><span class="sb-label">Races</span><span class="sb-val">${rn.races}</span></div>
        <div class="sb-row"><span class="sb-label">Wins</span><span class="sb-val accent">${rn.wins}</span></div>
      `);
    }

        looseBalls: [], // balls on the ground to pick up
        redScore: 0, blueScore: 0,
        redOut: 0, blueOut: 0,
        message: '', messageTimer: 0, messageColor: '#66bb6a',
        throwCooldown: 0,
        round: 1,
      };
      // Create teammates (red team, left side)
      for (let i = 0; i < 3; i++) {
        db.teammates.push({
          x: 100 + Math.random() * 200,
          y: 100 + i * 120,
          vx: 0, vy: (Math.random() - 0.5) * 2,
          alive: true, hasBall: Math.random() > 0.5,
          throwTimer: Math.floor(Math.random() * 120) + 60,
        });
      }
      // Create opponents (blue team, right side)
      for (let i = 0; i < 4; i++) {
        db.opponents.push({
          x: 500 + Math.random() * 200,
          y: 80 + i * 100,
          vx: 0, vy: (Math.random() - 0.5) * 2,
          alive: true, hasBall: true,
          throwTimer: Math.floor(Math.random() * 80) + 40,
          dodgeTimer: 0,
        });
      }
      // A few loose balls in the middle
      for (let i = 0; i < 2; i++) {
        db.looseBalls.push({ x: 350 + Math.random() * 100, y: 150 + Math.random() * 200 });
      }
    }

    function clickDodgeball(mx, my) {
      if (!db.player.hasBall || db.throwCooldown > 0) return;
      // Throw ball toward click position
      const dx = mx - db.player.x;
      const dy = my - db.player.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) return;
      db.balls.push({
        x: db.player.x, y: db.player.y,
        vx: (dx / dist) * 10,
        vy: (dy / dist) * 10,
        team: 'red',
      });
      db.player.hasBall = false;
      db.throwCooldown = 20;
    }

    function updateDodgeball() {
      // Court background
      ctx.fillStyle = '#2d5016';
      ctx.fillRect(0, 0, 800, 500);

      // Court floor (gym style)
      ctx.fillStyle = '#c4883a';
      ctx.fillRect(40, 40, 720, 420);
      ctx.fillStyle = '#b87d35';
      ctx.fillRect(40, 40, 720, 420);

      // Center line
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(400, 40); ctx.lineTo(400, 460); ctx.stroke();

      // Team areas
      ctx.fillStyle = 'rgba(229, 57, 53, 0.08)';
      ctx.fillRect(40, 40, 360, 420);
      ctx.fillStyle = 'rgba(66, 165, 245, 0.08)';
      ctx.fillRect(400, 40, 360, 420);

      // Boundary lines
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.strokeRect(40, 40, 720, 420);

      // Team labels
      ctx.font = '600 14px Outfit';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(229,57,53,0.4)';
      ctx.fillText('RED TEAM', 220, 30);
      ctx.fillStyle = 'rgba(66,165,245,0.4)';
      ctx.fillText('BLUE TEAM', 580, 30);

      db.throwCooldown = Math.max(0, db.throwCooldown - 1);

      // Move player
      const spd = 4;
      if (keys['ArrowUp'] && db.player.y > 60) db.player.y -= spd;
      if (keys['ArrowDown'] && db.player.y < 440) db.player.y += spd;
      if (keys['ArrowLeft'] && db.player.x > 60) db.player.x -= spd;
      if (keys['ArrowRight'] && db.player.x < 370) db.player.x += spd; // can't cross center

      // Pick up loose balls
      if (!db.player.hasBall) {
        db.looseBalls = db.looseBalls.filter(lb => {
          const d = Math.sqrt((lb.x - db.player.x) ** 2 + (lb.y - db.player.y) ** 2);
          if (d < 30) { db.player.hasBall = true; return false; }
          return true;
        });
      }

      // Move teammates AI
      db.teammates.forEach(tm => {
        if (!tm.alive) return;
        // Wander up/down
        tm.y += tm.vy;
        if (tm.y < 80 || tm.y > 420) tm.vy *= -1;
        tm.vy += (Math.random() - 0.5) * 0.3;
        tm.vy = Math.max(-2, Math.min(2, tm.vy));

        // Pick up loose balls
        if (!tm.hasBall) {
          db.looseBalls = db.looseBalls.filter(lb => {
            const d = Math.sqrt((lb.x - tm.x) ** 2 + (lb.y - tm.y) ** 2);
            if (d < 30) { tm.hasBall = true; return false; }
            return true;
          });
        }

        // Throw at opponents
        tm.throwTimer--;
        if (tm.throwTimer <= 0 && tm.hasBall) {
          const targets = db.opponents.filter(o => o.alive);
          if (targets.length > 0) {
            const target = targets[Math.floor(Math.random() * targets.length)];
            const dx = target.x - tm.x;
            const dy = target.y - tm.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            db.balls.push({
              x: tm.x, y: tm.y,
              vx: (dx / dist) * 8 + (Math.random() - 0.5) * 2,
              vy: (dy / dist) * 8 + (Math.random() - 0.5) * 2,
              team: 'red',
            });
            tm.hasBall = false;
          }
          tm.throwTimer = Math.floor(Math.random() * 100) + 60;
        }
      });

      // Move opponents AI
      db.opponents.forEach(opp => {
        if (!opp.alive) return;
        // Wander
        opp.y += opp.vy;
        if (opp.y < 80 || opp.y > 420) opp.vy *= -1;
        opp.vy += (Math.random() - 0.5) * 0.3;
        opp.vy = Math.max(-2.5, Math.min(2.5, opp.vy));

        // Pick up loose balls
        if (!opp.hasBall) {
          db.looseBalls = db.looseBalls.filter(lb => {
            const d = Math.sqrt((lb.x - opp.x) ** 2 + (lb.y - opp.y) ** 2);
            if (d < 30) { opp.hasBall = true; return false; }
            return true;
          });
        }

        // Dodge incoming red balls
        opp.dodgeTimer--;
        db.balls.forEach(ball => {
          if (ball.team === 'red') {
            const d = Math.sqrt((ball.x - opp.x) ** 2 + (ball.y - opp.y) ** 2);
            if (d < 100 && opp.dodgeTimer <= 0) {
              opp.vy = ball.y > opp.y ? -3 : 3;
              opp.dodgeTimer = 20;
            }
          }
        });

        // Throw at red team
        opp.throwTimer--;
        if (opp.throwTimer <= 0 && opp.hasBall) {
          // Target player or teammates
          const targets = [db.player, ...db.teammates.filter(t => t.alive)];
          const target = targets[Math.floor(Math.random() * targets.length)];
          const dx = target.x - opp.x;
          const dy = target.y - opp.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          db.balls.push({
            x: opp.x, y: opp.y,
            vx: (dx / dist) * 7 + (Math.random() - 0.5) * 1.5,
            vy: (dy / dist) * 7 + (Math.random() - 0.5) * 1.5,
            team: 'blue',
          });
          opp.hasBall = false;
          opp.throwTimer = Math.floor(Math.random() * 80) + 50;
        }
      });

      // Move balls
      db.balls = db.balls.filter(ball => {
        ball.x += ball.vx;
        ball.y += ball.vy;
        // Off screen
        if (ball.x < 0 || ball.x > 800 || ball.y < 0 || ball.y > 500) {
          db.looseBalls.push({ x: Math.max(60, Math.min(740, ball.x)), y: Math.max(60, Math.min(440, ball.y)) });
          return false;
        }

        // Check hits
        if (ball.team === 'red') {
          // Hit opponents
          for (let opp of db.opponents) {
            if (!opp.alive) continue;
            const d = Math.sqrt((ball.x - opp.x) ** 2 + (ball.y - opp.y) ** 2);
            if (d < 25) {
              opp.alive = false;
              db.blueOut++;
              score += 2;
              db.message = 'HIT! +2';
              db.messageColor = '#66bb6a';
              db.messageTimer = 25;
              updateHUD();
              db.looseBalls.push({ x: opp.x, y: opp.y });
              return false;
            }
          }
        } else {
          // Hit player
          const dp = Math.sqrt((ball.x - db.player.x) ** 2 + (ball.y - db.player.y) ** 2);
          if (dp < 22) {
            db.redOut++;
            db.message = 'YOU GOT HIT!';
            db.messageColor = '#e53935';
            db.messageTimer = 35;
            score = Math.max(0, score - 1);
            updateHUD();
            db.looseBalls.push({ x: db.player.x, y: db.player.y });
            // Respawn player briefly
            db.player.x = 150;
            db.player.y = 250;
            db.player.hasBall = false;
            return false;
          }
          // Hit teammates
          for (let tm of db.teammates) {
            if (!tm.alive) continue;
            const d = Math.sqrt((ball.x - tm.x) ** 2 + (ball.y - tm.y) ** 2);
            if (d < 22) {
              tm.alive = false;
              db.redOut++;
              db.looseBalls.push({ x: tm.x, y: tm.y });
              return false;
            }
          }
        }
        return true;
      });

      // Check round over — all opponents out
      const oppsAlive = db.opponents.filter(o => o.alive).length;
      if (oppsAlive === 0) {
        db.round++;
        db.redScore++;
        score += 5;
        db.message = '🎉 ROUND WIN! +5';
        db.messageColor = '#ffd54f';
        db.messageTimer = 45;
        updateHUD();
        // Reset round
        db.opponents.forEach((opp, i) => {
          opp.alive = true;
          opp.x = 500 + Math.random() * 200;
          opp.y = 80 + i * 100;
          opp.hasBall = true;
          opp.throwTimer = Math.floor(Math.random() * 60) + 30;
        });
        db.teammates.forEach(tm => {
          tm.alive = true;
          tm.hasBall = Math.random() > 0.5;
          tm.throwTimer = Math.floor(Math.random() * 80) + 40;
        });
        db.player.hasBall = true;
        db.blueOut = 0;
        db.redOut = 0;
      }

      // Draw loose balls
      db.looseBalls.forEach(lb => {
        ctx.fillStyle = '#e53935';
        ctx.beginPath();
        ctx.arc(lb.x, lb.y, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#b71c1c';
        ctx.lineWidth = 1;
        ctx.stroke();
      });

      // Draw teammates
      db.teammates.forEach(tm => {
        if (!tm.alive) return;
        drawPlayer(tm.x, tm.y, '#e53935', 1);
        if (tm.hasBall) {
          ctx.fillStyle = '#e53935';
          ctx.beginPath();
          ctx.arc(tm.x + 10, tm.y - 5, 5, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      // Draw opponents
      db.opponents.forEach(opp => {
        if (!opp.alive) return;
        drawPlayer(opp.x, opp.y, '#42a5f5', -1);
        if (opp.hasBall) {
          ctx.fillStyle = '#e53935';
          ctx.beginPath();
          ctx.arc(opp.x - 10, opp.y - 5, 5, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      // Draw player
      drawPlayer(db.player.x, db.player.y, '#e53935', 1);
      // Player indicator arrow
      ctx.fillStyle = '#ffd54f';
      ctx.beginPath();
      ctx.moveTo(db.player.x, db.player.y - 42);
      ctx.lineTo(db.player.x - 6, db.player.y - 50);
      ctx.lineTo(db.player.x + 6, db.player.y - 50);
      ctx.fill();
      // Ball in hand
      if (db.player.hasBall) {
        ctx.fillStyle = '#e53935';
        ctx.beginPath();
        ctx.arc(db.player.x + 12, db.player.y - 5, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#b71c1c';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // Draw flying balls
      db.balls.forEach(ball => {
        ctx.fillStyle = '#e53935';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, 5, 0, Math.PI * 2);
        ctx.fill();
        // Motion trail
        ctx.fillStyle = 'rgba(229, 57, 53, 0.3)';
        ctx.beginPath();
        ctx.arc(ball.x - ball.vx * 0.5, ball.y - ball.vy * 0.5, 4, 0, Math.PI * 2);
        ctx.fill();
      });

      // Message
      if (db.messageTimer > 0) {
        db.messageTimer--;
        drawMessage(db.message, db.messageColor, 240);
      }

      // Scoreboard
      const aliveRed = db.teammates.filter(t => t.alive).length + 1; // +1 for player
      const aliveBlue = db.opponents.filter(o => o.alive).length;
      updateScoreboard(`
        <div class="sb-row"><span class="sb-label">Round</span><span class="sb-val">${db.round}</span></div>
        <div class="sb-row"><span class="sb-label">Red Alive</span><span class="sb-val accent">${aliveRed}</span></div>
        <div class="sb-row"><span class="sb-label">Blue Alive</span><span class="sb-val">${aliveBlue}</span></div>
        <div class="sb-row"><span class="sb-label">Round Wins</span><span class="sb-val">${db.redScore}</span></div>
      `);
    }

    // ============================================================
    // VOLLEYBALL — Beach volleyball!
    // ============================================================
    let vb = {};
    function initVolleyball() {
      document.getElementById('instructions').textContent = 'Arrow keys to move, click/tap to bump the ball! Keep it in play!';
      timeLeft = 45;
      vb = {
        player: { x: 200, y: 380, speed: 4.5 },
        teammates: [
          { x: 120, y: 360, vy: 0, role: 'left' },
          { x: 280, y: 360, vy: 0, role: 'right' },
        ],
        opponents: [
          { x: 500, y: 360, vy: 0, role: 'left' },
          { x: 600, y: 360, vy: 0, role: 'center' },
          { x: 700, y: 360, vy: 0, role: 'right' },
        ],
        ball: { x: 200, y: 200, vx: 3, vy: -4, gravity: 0.15, onGround: false },
        net: { x: 400, y: 200, h: 200 },
        myScore: 0, oppScore: 0,
        serving: 'player', // 'player' or 'opponent'
        rally: false,
        touches: 0, // team touches (max 3)
        lastTouch: '', // 'red' or 'blue'
        message: '', messageTimer: 0, messageColor: '#66bb6a',
        serveTimer: 0,
        pointScored: false,
      };
      vb.ball.x = 200;
      vb.ball.y = 300;
      vb.ball.vx = 0;
      vb.ball.vy = 0;
      vb.serveTimer = 40;
    }

    function clickVolleyball(mx, my) {
      // Bump the ball if close to player
      const b = vb.ball;
      const p = vb.player;
      const dist = Math.sqrt((b.x - p.x) ** 2 + (b.y - p.y) ** 2);
      if (dist < 60 && !vb.pointScored) {
        // Direct ball toward opponent side with arc
        const power = 6 + Math.random() * 2;
        b.vx = 3 + Math.random() * 2;
        b.vy = -power;
        vb.touches++;
        vb.lastTouch = 'red';
        vb.rally = true;
      }
    }

    function serveBall(team) {
      const b = vb.ball;
      vb.touches = 0;
      vb.pointScored = false;
      if (team === 'player') {
        b.x = 200; b.y = 300;
        b.vx = 4 + Math.random() * 2;
        b.vy = -5 - Math.random() * 2;
        vb.lastTouch = 'red';
      } else {
        b.x = 600; b.y = 300;
        b.vx = -(4 + Math.random() * 2);
        b.vy = -5 - Math.random() * 2;
        vb.lastTouch = 'blue';
      }
      vb.rally = true;
    }

    function updateVolleyball() {
      // Sky background
      const sky = ctx.createLinearGradient(0, 0, 0, 500);
      sky.addColorStop(0, '#87CEEB');
      sky.addColorStop(0.6, '#e0f0ff');
      sky.addColorStop(1, '#f4d798');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, 800, 500);

      // Sun
      ctx.fillStyle = '#ffd54f';
      ctx.beginPath(); ctx.arc(680, 60, 40, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,213,79,0.2)';
      ctx.beginPath(); ctx.arc(680, 60, 60, 0, Math.PI * 2); ctx.fill();

      // Sand
      ctx.fillStyle = '#f4d798';
      ctx.fillRect(0, 400, 800, 100);
      ctx.fillStyle = '#e8c878';
      ctx.fillRect(0, 395, 800, 8);

      // Court lines on sand
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2;
      ctx.strokeRect(60, 395, 680, 80);

      // Net
      ctx.fillStyle = '#333';
      ctx.fillRect(398, 200, 4, 200); // net pole
      // Net mesh
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      for (let ny = 210; ny < 400; ny += 12) {
        ctx.beginPath(); ctx.moveTo(390, ny); ctx.lineTo(410, ny); ctx.stroke();
      }
      for (let nx = 390; nx <= 410; nx += 5) {
        ctx.beginPath(); ctx.moveTo(nx, 200); ctx.lineTo(nx, 400); ctx.stroke();
      }
      // Net top
      ctx.fillStyle = '#fff';
      ctx.fillRect(385, 198, 30, 4);

      // Serve timer
      if (vb.serveTimer > 0) {
        vb.serveTimer--;
        if (vb.serveTimer === 0) {
          serveBall(vb.serving);
        }
      }

      // Move player
      const p = vb.player;
      if (keys['ArrowLeft'] || keys['a']) p.x -= p.speed;
      if (keys['ArrowRight'] || keys['d']) p.x += p.speed;
      if (keys['ArrowUp'] || keys['w']) p.y -= p.speed;
      if (keys['ArrowDown'] || keys['s']) p.y += p.speed;
      // Clamp to left side
      p.x = Math.max(60, Math.min(380, p.x));
      p.y = Math.max(280, Math.min(420, p.y));

      // Move teammates to track ball on our side
      vb.teammates.forEach(tm => {
        const targetX = tm.role === 'left' ? 140 : 280;
        const targetY = vb.ball.x < 400 ? Math.min(Math.max(vb.ball.y + 40, 320), 400) : 370;
        tm.x += (targetX - tm.x) * 0.03;
        tm.y += (targetY - tm.y) * 0.04;
        tm.x = Math.max(60, Math.min(380, tm.x));
        tm.y = Math.max(300, Math.min(420, tm.y));
      });

      // Move opponents AI
      vb.opponents.forEach((opp, i) => {
        const baseX = [500, 600, 700][i];
        // Track ball when on their side
        if (vb.ball.x > 400) {
          opp.x += (vb.ball.x - opp.x) * 0.04;
          opp.y += (Math.min(vb.ball.y + 30, 400) - opp.y) * 0.04;
        } else {
          opp.x += (baseX - opp.x) * 0.02;
          opp.y += (370 - opp.y) * 0.03;
        }
        opp.x = Math.max(420, Math.min(740, opp.x));
        opp.y = Math.max(300, Math.min(420, opp.y));
      });

      // Ball physics
      const b = vb.ball;
      if (vb.rally) {
        b.vy += b.gravity;
        b.x += b.vx;
        b.y += b.vy;

        // Net collision
        if (b.x > 388 && b.x < 412 && b.y > 200) {
          b.vx *= -0.5;
          b.x = b.vx > 0 ? 412 : 388;
        }

        // Auto-bump by teammates when ball is close
        vb.teammates.forEach(tm => {
          const d = Math.sqrt((b.x - tm.x) ** 2 + (b.y - tm.y) ** 2);
          if (d < 35 && b.vy > 0 && vb.lastTouch === 'red' && vb.touches < 3) {
            // Set ball toward opponent side
            b.vy = -5.5 - Math.random() * 2;
            b.vx = 3 + Math.random() * 2;
            vb.touches++;
          }
        });

        // Auto-bump by opponents
        vb.opponents.forEach(opp => {
          const d = Math.sqrt((b.x - opp.x) ** 2 + (b.y - opp.y) ** 2);
          if (d < 35 && b.vy > 0 && vb.lastTouch !== 'blue') {
            b.vy = -5.5 - Math.random() * 2;
            b.vx = -(3 + Math.random() * 3);
            vb.lastTouch = 'blue';
            vb.touches = 1;
          } else if (d < 35 && b.vy > 0 && vb.touches < 3) {
            b.vy = -5 - Math.random() * 2;
            b.vx = -(2 + Math.random() * 3);
            vb.touches++;
          }
        });

        // Player bump (auto when close + ball falling)
        const pd = Math.sqrt((b.x - p.x) ** 2 + (b.y - p.y) ** 2);
        if (pd < 40 && b.vy > 0) {
          b.vy = -6 - Math.random() * 2;
          b.vx = 3 + Math.random() * 2;
          vb.touches++;
          vb.lastTouch = 'red';
        }

        // Ball hits ground
        if (b.y > 430 && !vb.pointScored) {
          vb.pointScored = true;
          vb.rally = false;
          b.vy = 0; b.vx = 0;

          if (b.x < 400) {
            // Ball landed on our side — opponent scores
            vb.oppScore++;
            vb.message = 'OPPONENT POINT!';
            vb.messageColor = '#e53935';
            vb.serving = 'opponent';
          } else {
            // Ball landed on their side — we score
            vb.myScore++;
            score += 2;
            vb.message = 'YOUR POINT! +2';
            vb.messageColor = '#66bb6a';
            vb.serving = 'player';
            updateHUD();
          }
          vb.messageTimer = 40;
          vb.serveTimer = 60;
          vb.touches = 0;
        }

        // Keep ball in bounds horizontally
        if (b.x < 30) { b.x = 30; b.vx = Math.abs(b.vx) * 0.5; }
        if (b.x > 770) { b.x = 770; b.vx = -Math.abs(b.vx) * 0.5; }
      }

      // Draw teammates
      vb.teammates.forEach(tm => {
        drawPlayer(tm.x, tm.y, '#e53935', 1);
      });

      // Draw opponents
      vb.opponents.forEach(opp => {
        drawPlayer(opp.x, opp.y, '#42a5f5', -1);
      });

      // Draw player
      drawPlayer(p.x, p.y, '#e53935', 1);
      // Player indicator
      ctx.fillStyle = '#ffd54f';
      ctx.beginPath();
      ctx.moveTo(p.x, p.y - 42);
      ctx.lineTo(p.x - 6, p.y - 50);
      ctx.lineTo(p.x + 6, p.y - 50);
      ctx.fill();

      // Draw ball (volleyball)
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#bbb';
      ctx.lineWidth = 1;
      ctx.stroke();
      // Volleyball lines
      ctx.strokeStyle = '#ccc';
      ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.arc(b.x, b.y, 10, 0.3, 1.2); ctx.stroke();
      ctx.beginPath(); ctx.arc(b.x, b.y, 10, 2.0, 2.9); ctx.stroke();
      ctx.beginPath(); ctx.arc(b.x, b.y, 10, 3.8, 4.7); ctx.stroke();
      // Ball shadow
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.beginPath();
      ctx.ellipse(b.x, 440, 12, 4, 0, 0, Math.PI * 2);
      ctx.fill();

      // Score display on court
      ctx.font = '900 28px Outfit';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#e53935';
      ctx.fillText(vb.myScore, 200, 470);
      ctx.fillStyle = '#888';
      ctx.fillText('-', 400, 470);
      ctx.fillStyle = '#42a5f5';
      ctx.fillText(vb.oppScore, 600, 470);

      // Team labels
      ctx.font = '600 12px Outfit';
      ctx.fillStyle = '#e53935';
      ctx.fillText('YOU', 200, 488);
      ctx.fillStyle = '#42a5f5';
      ctx.fillText('THEM', 600, 488);

      // Message
      if (vb.messageTimer > 0) {
        vb.messageTimer--;
        drawMessage(vb.message, vb.messageColor, 150);
      }

      updateScoreboard(`
        <div class="sb-row"><span class="sb-label">Your Score</span><span class="sb-val accent">${vb.myScore}</span></div>
        <div class="sb-row"><span class="sb-label">Their Score</span><span class="sb-val">${vb.oppScore}</span></div>
        <div class="sb-row"><span class="sb-label">Touches</span><span class="sb-val">${vb.touches}/3</span></div>
      `);
    }

    // Touch controls
    canvas.addEventListener('touchstart', e => {
      const t = e.touches[0];
      canvas._touchX = t.clientX;
      canvas._touchY = t.clientY;
    });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      const dx = t.clientX - canvas._touchX;
      const dy = t.clientY - canvas._touchY;
      if (Math.abs(dx) > 8) { keys[dx > 0 ? 'ArrowRight' : 'ArrowLeft'] = true; keys[dx > 0 ? 'ArrowLeft' : 'ArrowRight'] = false; }
      if (Math.abs(dy) > 8) { keys[dy > 0 ? 'ArrowDown' : 'ArrowUp'] = true; keys[dy > 0 ? 'ArrowUp' : 'ArrowDown'] = false; }
      canvas._touchX = t.clientX;
      canvas._touchY = t.clientY;
    });
    canvas.addEventListener('touchend', () => { keys['ArrowUp'] = keys['ArrowDown'] = keys['ArrowLeft'] = keys['ArrowRight'] = false; });
  </script>
</body>
</html>
